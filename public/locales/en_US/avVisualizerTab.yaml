# Short labels for optimizer-internal "extended" StatKey strings used by battleConfigs (e.g. RuanMei's
# and Huohuo's BOOST/BREAK_EFFICIENCY_BOOST/RES_PEN) — these aren't real Stats enum members, so they
# have no entry under common:ShortStats. DEF_PEN/WIND_RES_PEN *are* real StatKey members but still have
# no common:ShortStats entry, so they fall back to here too (see CharacterStatePanel's lookup order).
