DPSScoreDisclaimer:
  Title: '⚠️ チーム編成、光円錐、星魂を比較する目的で、コンボダメージや DPS スコアを使わないでください！'
  Body:
    l1: コンボダメージと DPS スコアは、現在のチーム編成における固定のスキル回しで、あなたのビルドがどれだけのダメージを出すかを測るものです。
    l2: 異なるチーム編成、光円錐、星魂、バージョンの差は、固定のスキル回しでは測りきれない、行動順を早める効果や EP などのシステムに影響を与えます。そのため、異なる編成間でスコアを比較しても意味がありません。各キャラクターには、固有のスキル回しと基準となる長さが設定されています。
    l3: 現在のチーム編成において、異なる遺物、メインステータス、セット効果がスキル回しのダメージにどう影響するかを比較したい場合は、コンボダメージを使用してください。一方 DPS スコアは、あなたのコンボダメージを「同じ速度で、サブステータスが最適に分配されたシミュレーション上の基準値」と比較し、あなたの遺物が理想的なビルドにどれだけ近づいているかを示すものです。
    l4: DPS スコアの基準値は、キャラクターの速度に合わせて生成されます。速度が異なるビルドは全く異なる基準でスコア化されるため、比較はできません。これは、速度の遅いビルドの方がコンボダメージが高くても、DPS スコアが低くなることがある理由でもあります。同じ速度のビルド間で DPS スコアを比較したい場合は、サイドバーで速度の基準値を設定してください。
  ButtonText: 理解しました。この警告を非表示にします
  Confirmation:
    Title: 内容を理解し、警告を非表示にする
    Body: 私は、異なるチーム編成、光円錐、星魂、バージョンにおいて、コンボダメージや DPS スコアを比較しません。
Disclaimer: '注意：コンボダメージは、同じビルド内での遺物を比べるための指標です。チーム編成・光円錐・星魂が異なるビルドを比べる目的では<1>使えません</1>。'
DisclaimerDescription: 'コンボダメージは、特定のチーム編成が、1回のスキル回しで出せるダメージを計測する機能です。味方や星魂、光円錐を変更すると、スキル回しの長さやEP回復量、バフの継続時間なども変わります。そのため、コンボダメージからチーム編成や光円錐の優劣を比べたり、星魂によるダメージ上昇率を計測したりすることはできません。あくまでチーム編成と基準速度が同じ前提のうえで、遺物を比べるための機能です。'
