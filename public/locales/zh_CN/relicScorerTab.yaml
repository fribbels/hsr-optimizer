DPSScoreDisclaimer:
  Title: 请勿使用连招伤害或 DPS 评分来比较不同队伍、光锥或命座！
  Body:
    l1: 连招伤害和 DPS 评分用于衡量在固定技能循环下，当前队伍配置中配装的输出能力。
    l2: 不同队伍、光锥、命座或版本会影响行动提前、能量及其他未被固定循环涵盖的机制，因此不同配置之间的评分不具备可比性。每个角色都有其独特的循环方式和输出周期。
    l3: 在当前队伍中，可使用连招伤害比较不同遗器、主属性和套装效果对循环伤害的影响。DPS 评分则将连招伤害与在相同速度下、副词条最优分配的模拟基准进行对比，用于衡量当前遗器与最优配装的差距。
    l4: DPS 评分基准会根据角色战斗时的速度生成。不同速度下的配装对应不同基准，无法直接比较。这也解释了为何较低速度的配装可能拥有更高的连招伤害但更低的 DPS 评分。请在侧边栏设置速度基准，以在相同速度目标下比较 DPS 评分。
  ButtonText: 了解并隐藏提示
  Confirmation:
    Title: 确认并隐藏提示
    Body: 我不会使用连招伤害或 DPS 评分来比较不同队伍、光锥、命座或版本。
Disclaimer: '注意：连招伤害旨在比较不同遗物相对于所选队伍的表现，<1>不应</1>用于比较不同队伍/光锥/命座！'
DisclaimerDescription: '连招伤害是一种用于衡量特定队伍配置下，单次技能循环造成伤害的工具。更换队伍/命座/光锥都会改变循环时长、能量获取量、增益持续时间等因素。这意味着连招伤害不能用于判断哪个队伍更强、哪个光锥更好，或衡量命座间的伤害提升。连招伤害的唯一用途是在固定的队伍与速度目标下，对比不同遗器的表现。'
